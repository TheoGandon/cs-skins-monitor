name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_GITHUB_PACKAGE_PUBLICATION }}
      - name: Build and push Docker image
        env:
          # Optionally set this secret in your repo to inject the production API endpoint at build-time
          VITE_SKINPORT_API: ${{ secrets.VITE_SKINPORT_API }}
        run: |
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          if [ -n "$VITE_SKINPORT_API" ]; then
            docker build --build-arg VITE_SKINPORT_API="$VITE_SKINPORT_API" -t ghcr.io/$REPO:latest .
          else
            docker build -t ghcr.io/$REPO:latest .
          fi
          docker tag ghcr.io/$REPO:latest ghcr.io/$REPO:$GITHUB_SHA
          docker push ghcr.io/$REPO:latest
          docker push ghcr.io/$REPO:$GITHUB_SHA