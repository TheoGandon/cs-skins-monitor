name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_GITHUB_PACKAGE_PUBLICATION }}
      - name: Build and push Docker image
        run: |
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          # Force build-arg so the production build includes the Skinport API endpoint
          docker build --build-arg VITE_SKINPORT_API="https://api.skinport.com/v1/items" -t ghcr.io/$REPO:latest .
          docker tag ghcr.io/$REPO:latest ghcr.io/$REPO:$GITHUB_SHA
          docker push ghcr.io/$REPO:latest
          docker push ghcr.io/$REPO:$GITHUB_SHA